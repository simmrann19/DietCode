<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Sidebar with Hiding Button</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            display: flex;
            background-color: #f4f4f9;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background-color: #1e1e2f;
            color: #fff;
            padding: 20px;
            transition: left 0.3s ease;
            z-index: 1000;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #bbb;
            padding: 10px 0;
            text-decoration: none;
            transition: color 0.2s;
        }

        .sidebar a:hover {
            color: #fff;
        }

        .main-content {
            flex: 1;
            padding: 40px;
        }

        .toggle-btn {
            background-color: #1e1e2f;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 20px;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }


        body.sidebar-open #toggleBtn {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }


        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            float: right;
            line-height: 1;
        }
    </style>
</head>
<body>


    <nav class="sidebar" id="sidebar">

        <button class="close-btn" id="closeBtn">&times;</button>
        <h2>Menu</h2>
        <a href="#">Dashboard</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
    </nav>


    <main class="main-content">
        <button class="toggle-btn" id="toggleBtn">☰ Open Menu</button>
        <h1>Welcome to My Website</h1>
        <p>The open button disappears cleanly when the sidebar is visible.</p>
    </main>


    <script>
        const toggleBtn = document.getElementById('toggleBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');


        toggleBtn.addEventListener('click', () => {
            sidebar.classList.add('active');
            document.body.classList.add('sidebar-open');
        });


        closeBtn.addEventListener('click', () => {
            sidebar.classList.remove('active');
            document.body.classList.remove('sidebar-open');
        });
    </script>

</body>
</html>
